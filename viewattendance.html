<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      text-align: center;
    }
    h1 {
      background: black;
      color: white;
      padding: 15px;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 70%;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }
    th {
      background: #333;
      color: white;
    }
    button {
      padding: 8px 15px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: darkblue;
    }
    nav {
      margin: 20px;
      border-radius: 5px;
      border: 1px solid #ccc;
      width: 80%;
      margin-left: auto;
    margin-right: auto;
    }
    nav a {
      text-decoration: none;
      color: black;
      padding: 10px 20px;
      display: inline-block;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>
    <nav>
        <a href="home.html">HOME</a>
        <a href="student.html">STUDENTS</a>
        <a href="teachers.html">TEACHERS</a>
        <a href="classes.html">CLASSES</a>
        <a href="marks.html">MARKS</a>
        <a href="attendance.html">ATTENDANCE</a>
    </nav>

<h1>View Attendance</h1>

<label>Select Date: </label>
<input type="date" id="date">
<button onclick="viewAttendance()">View</button>

<table>
  <thead>
    <tr>
      <th>Student Name</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
function viewAttendance() {
  const date = document.getElementById("date").value;

  if (!date) {
    alert("Please select a date");
    return;
  }

  const data = localStorage.getItem(date);

  if (!data) {
    alert("No attendance found for this date");
    return;
  }

  const attendance = JSON.parse(data);
  const tableBody = document.getElementById("tableBody");

  tableBody.innerHTML = "";

  attendance.forEach(item => {
    let row = `<tr>
      <td>${item.name}</td>
      <td>${item.status}</td>
    </tr>`;
    tableBody.innerHTML += row;
  });
}
</script>

</body>
</html>
