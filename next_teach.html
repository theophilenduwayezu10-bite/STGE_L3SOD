<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Page</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
  color:white;
  text-align:center;
  min-height:100vh;
}

/* HEADER */
h3{
  background:#0f172a;
  color:#facc15;
  padding:15px;
}

/* MESSAGE */
h2{
  margin:20px;
  color:#cbd5e1;
}

/* FIELDSET */
fieldset{
  width:80%;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* CONTAINER */
.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}

/* CARD */
.card{
  width:180px;
  text-decoration:none;
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:12px;
  transition:0.3s;
  color:white;
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
  transform:scale(1.08);
  border-color:#22c55e;
}

/* IMAGE */
.card img{
  width:100%;
  height:140px;
  border-radius:10px;
}

/* TEXT */
.card p{
  margin-top:8px;
  color:#cbd5e1;
}

/* BUTTON */
button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  background:#facc15;
  color:#0f172a;
  transition:0.3s;
}

button:hover{
  background:#22c55e;
  color:white;
}
</style>

</head>

<body>

<h3>WELCOME AS TEACHER</h3>

<h2>
You are verified! Level 3 teacher.<br>
You can now access learning, marks and attendance.
</h2>

<fieldset>
<h2>Select an Option</h2>

<div class="container">

  <a href="teacher_elearn.html" class="card">
    <img src="e_learn.webp">
    <p>E-Learning</p>
  </a>

  <a href="teacher_attendance.html" class="card">
    <img src="attendance.webp">
    <p>Attendance</p>
  </a>

  <a href="teacher_marks.html" class="card">
    <img src="marks.webp">
    <p>Marks</p>
  </a>

</div>

<button onclick="window.location.href='teachers.html'">Go Back</button>

</fieldset>

</body>
</html>
