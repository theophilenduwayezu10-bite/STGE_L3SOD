<!DOCTYPE html>
<html>
<head>
    <title>Student Marks View</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7fb;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #0f172a;
        }

        table {
            width: 95%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th {
            background: #0f172a;
            color: white;
            padding: 10px;
        }

        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        .msg {
            text-align: center;
            margin-top: 20px;
            color: red;
        }
    </style>
</head>

<body>

<h2>Student Marks</h2>

<table>
<tr>
    <th>Name</th>
    <th>Website development</th>
    <th>Version Control</th>
    <th>JavaScript</th>
    <th>UI/UX</th>
    <th>Graphic Design</th>
    <th>Game Development</th>
    <th>Total</th>
</tr>

<tbody id="data"></tbody>
</table>

<p class="msg" id="msg"></p>

<script>
let saved = JSON.parse(localStorage.getItem("marks")) || [];

let tbody = document.getElementById("data");

if (saved.length === 0) {
    document.getElementById("msg").innerText = "No marks saved yet!";
} else {

    saved.forEach(student => {

        let m = student.marks || [0,0,0,0,0,0];

        let row = `<tr>
            <td>${student.name}</td>
            <td>${m[0]}</td>
            <td>${m[1]}</td>
            <td>${m[2]}</td>
            <td>${m[3]}</td>
            <td>${m[4]}</td>
            <td>${m[5]}</td>
            <td>${student.total}</td>
        </tr>`;

        tbody.innerHTML += row;
    });
}
</script>

</body>
</html>
