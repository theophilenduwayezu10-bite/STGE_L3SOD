<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      text-align: center;
    }
    h1 {
      background: black;
      color: white;
      padding: 15px;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 80%;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ccc;
    }
    th {
      background: #333;
      color: white;
    }
    button {
      padding: 8px 15px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: darkgreen;
    }
  </style>
</head>
<body>

<h1>Class Attendance</h1>

<label>Select Date: </label>
<input type="date" id="date">

<table>
  <thead>
    <tr>
      <th>Student Name</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="attendanceTable">
  </tbody>
</table>

<button onclick="saveAttendance()">Save Attendance</button>

<script>
  const students = ["Lydia", "Emile", "Theophile", "liliane", "Dan", "Sumaya", "Josiane", "Gikundiro", "Sandrine", "Claire", "Augustin", "Vradmir", "Manishimwe", "Nduwayezu", "Eric", "Theodethe", "Nadia", "Evaliste", "Beulla", "Hamiss", "Marieleine", "Daphine", "Ange", "Christian", "Danny", "Edouige", "Teta"];

  const table = document.getElementById("attendanceTable");

  function loadTable() {
    table.innerHTML = "";
    students.forEach((student, index) => {
      let row = `<tr>
        <td>${student}</td>
        <td>
          <select id="status-${index}">
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
          </select>
        </td>
      </tr>`;
      table.innerHTML += row;
    });
  }

  function saveAttendance() {
    const date = document.getElementById("date").value;

    if (!date) {
      alert("Please select a date");
      return;
    }

    let attendanceData = [];

    students.forEach((student, index) => {
      const status = document.getElementById(`status-${index}`).value;
      attendanceData.push({ name: student, status: status });
    });

    localStorage.setItem(date, JSON.stringify(attendanceData));

    alert("Attendance saved successfully for " + date);
  }

  loadTable();
</script>

<hr>
<h2>Attendance History</h2>

<label>Choose Date: </label>
<input type="date" id="historyDate">
<button onclick="loadHistory()">View Attendance</button>

<table>
  <thead>
    <tr>
      <th>Student Name</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="historyTable"></tbody>
</table>

<script>
function loadHistory() {
  const date = document.getElementById("historyDate").value;

  if (!date) {
    alert("Please select a date");
    return;
  }

  const data = localStorage.getItem(date);

  if (!data) {
    alert("No attendance found for this date");
    return;
  }

  const attendance = JSON.parse(data);
  const historyTable = document.getElementById("historyTable");

  historyTable.innerHTML = "";

  attendance.forEach(item => {
    let row = `<tr>
      <td>${item.name}</td>
      <td>${item.status}</td>
    </tr>`;
    historyTable.innerHTML += row;
  });
}
</script>
 <button onclick="window.location.href='index.html'">go back</button>

</body>
</html>
