<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Learning Student</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0b0f19;
    color:white;
}

/* HEADER */
header{
    background:#0f172a;
    text-align:center;
    padding:20px;
    border-bottom:2px solid #3b82f6;
}

header h1{
    color:#facc15;
}

/* BUTTON */
.top-bar{
    text-align:center;
    padding:15px;
}

button{
    background:#3b82f6;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

/* SEARCH */
.search{
    text-align:center;
    margin:20px;
}

.search input{
    width:60%;
    padding:12px;
    border-radius:8px;
    border:1px solid #3b82f6;
    background:#111827;
    color:white;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:#111827;
    border:1px solid #3b82f6;
    padding:20px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#22c55e;
}

.card h3{
    color:#facc15;
}

.card p{
    color:#cbd5e1;
    font-size:14px;
    margin-top:5px;
}

/* DOWNLOAD */
.download{
    display:inline-block;
    margin-top:10px;
    padding:10px;
    background:#22c55e;
    color:white;
    text-decoration:none;
    border-radius:6px;
    cursor:pointer;
}

.download:hover{
    background:#16a34a;
}

/* FOOTER */
footer{
    text-align:center;
    padding:15px;
    margin-top:20px;
    border-top:1px solid #3b82f6;
    color:#aaa;
    font-size:13px;
}
</style>
</head>

<body>

<header>
    <h1>E-LEARNING STUDENT</h1>
</header>

<div class="top-bar">
    <button onclick="window.location.href='index.html'">⬅ Go Back</button>
</div>

<div class="search">
    <input type="text" placeholder="Search subject...">
</div>

<div class="container" id="container"></div>

<footer>
    © 2026 Student E-Learning Platform
</footer>

<script>

// ================== LOAD SAVED DATA ==================
let data = JSON.parse(localStorage.getItem("subjects")) || [];

// fallback demo data niba ntacyo kirimo
if(data.length === 0){
    data = [
        {title:"Web Development", desc:"HTML, CSS, JS basics"},
        {title:"JavaScript", desc:"Interactive programming"},
        {title:"Vue JS", desc:"Modern frontend framework"},
        {title:"UX/UI Design", desc:"Design user interfaces"}
    ];
}

let container = document.getElementById("container");

// ================== RENDER CARDS ==================
data.forEach((item, index) => {

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h3>${item.title}</h3>
        <p>${item.desc}</p>

        <a class="download" onclick="downloadFile('${item.title}')">
            Download
        </a>
    `;

    container.appendChild(card);
});

// ================== FAKE DOWNLOAD ==================
function downloadFile(title){

    let fileContent = "Course: " + title + "\nDownloaded from E-Learning System";

    let blob = new Blob([fileContent], {type:"text/plain"});
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = title + ".txt";
    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
