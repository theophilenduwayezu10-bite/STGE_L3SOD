
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Management - Attendance</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b, #2563eb);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .header {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 25px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .header h1 {
      font-size: 40px;
      margin-bottom: 10px;
      color: #facc15;
    }

    .header p {
      color: #e2e8f0;
      font-size: 16px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }

    input[type="date"],
    input[type="text"],
    select {
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    input[type="text"] {
      width: 250px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 15px;
    }

    th {
      background: #facc15;
      color: #111827;
      padding: 15px;
      font-size: 16px;
    }

    td {
      background: rgba(255,255,255,0.08);
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    tr:hover td {
      background: rgba(255,255,255,0.15);
      transition: 0.3s;
    }

    .present {
      color: #22c55e;
      font-weight: bold;
    }

    .absent {
      color: #ef4444;
      font-weight: bold;
    }

    .late {
      color: #facc15;
      font-weight: bold;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: 0.3s;
    }

    .save-btn {
      background: #22c55e;
      color: white;
    }

    .save-btn:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .history-btn {
      background: #3b82f6;
      color: white;
    }

    .history-btn:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .reset-btn {
      background: #ef4444;
      color: white;
    }

    .reset-btn:hover {
      background: #dc2626;
      transform: scale(1.05);
    }

    .back-btn {
      background: #facc15;
      color: black;
    }

    .back-btn:hover {
      background: #eab308;
      transform: scale(1.05);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .stat-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }

    .stat-box h2 {
      font-size: 35px;
      margin-bottom: 10px;
    }

    .stat-box p {
      color: #cbd5e1;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #e2e8f0;
      font-size: 14px;
    }

    @media(max-width:768px){
      .header h1 {
        font-size: 28px;
      }

      table {
        font-size: 14px;
      }

      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }

      input[type="text"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>📘 Class Attendance System</h1>
    <p>Manage student attendance professionally and beautifully</p>
  </div>

  <div class="card">

    <div class="top-bar">
      <div>
        <label>Select Date:</label>
        <input type="date" id="date">
      </div>

      <div>
        <input type="text" id="search" placeholder="🔍 Search student...">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Student Name</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="attendanceTable"></tbody>
    </table>

    <div class="btn-group">
      <button class="save-btn" onclick="saveAttendance()">💾 Save Attendance</button>
      <button class="reset-btn" onclick="resetAttendance()">🗑 Reset</button>
      <button class="back-btn" onclick="window.location.href='index.html'">⬅ Go Back</button>
    </div>

    <div class="stats">
      <div class="stat-box">
        <h2 id="presentCount">0</h2>
        <p>Present Students</p>
      </div>

      <div class="stat-box">
        <h2 id="absentCount">0</h2>
        <p>Absent Students</p>
      </div>

      <div class="stat-box">
        <h2 id="lateCount">0</h2>
        <p>Late Students</p>
      </div>
    </div>

  </div>

  <div class="card">
    <h2 style="margin-bottom:20px; color:#facc15;">📂 Attendance History</h2>

    <div class="top-bar">
      <div>
        <label>Choose Date:</label>
        <input type="date" id="historyDate">
      </div>

      <button class="history-btn" onclick="loadHistory()">📖 View Attendance</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Student Name</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="historyTable"></tbody>
    </table>
  </div>

  <footer>
    © 2026 Class Management System | Designed By Manishimwe
  </footer>

</div>

<script>

const students = [
  "Lydia", "Emile", "Theophile", "Liliane", "Dan",
  "Sumaya", "Josiane", "Gikundiro", "Sandrine", "Claire",
  "Augustin", "Vradmir", "Manishimwe", "Nduwayezu", "Eric",
  "Theodethe", "Nadia", "Evaliste", "Beulla", "Hamiss",
  "Marieleine", "Daphine", "Ange", "Christian", "Danny",
  "Edouige", "Teta"
];

const table = document.getElementById("attendanceTable");
const search = document.getElementById("search");

function loadTable(filter = "") {
  table.innerHTML = "";

  const filteredStudents = students.filter(student =>
    student.toLowerCase().includes(filter.toLowerCase())
  );

  filteredStudents.forEach((student, index) => {

    let row = `
      <tr>
        <td>${index + 1}</td>

        <td>${student}</td>

        <td>
          <select id="status-${student}" onchange="updateStats()">
            <option value="Present">✅ Present</option>
            <option value="Absent">❌ Absent</option>
            <option value="Late">⏰ Late</option>
          </select>
        </td>
      </tr>
    `;

    table.innerHTML += row;
  });

  updateStats();
}

search.addEventListener("keyup", () => {
  loadTable(search.value);
});

function updateStats() {
  let present = 0;
  let absent = 0;
  let late = 0;

  students.forEach(student => {
    const select = document.getElementById(`status-${student}`);

    if(select){
      if(select.value === "Present") present++;
      if(select.value === "Absent") absent++;
      if(select.value === "Late") late++;
    }
  });

  document.getElementById("presentCount").innerText = present;
  document.getElementById("absentCount").innerText = absent;
  document.getElementById("lateCount").innerText = late;
}

function saveAttendance() {

  const date = document.getElementById("date").value;

  if(!date){
    alert("Please select a date");
    return;
  }

  let attendanceData = [];

  students.forEach(student => {

    const select = document.getElementById(`status-${student}`);

    let status = "Present";

    if(select){
      status = select.value;
    }

    attendanceData.push({
      name: student,
      status: status
    });
  });

  localStorage.setItem(date, JSON.stringify(attendanceData));

  alert("✅ Attendance saved successfully for " + date);
}

function loadHistory() {

  const date = document.getElementById("historyDate").value;

  if(!date){
    alert("Please select a date");
    return;
  }

  const data = localStorage.getItem(date);

  if(!data){
    alert("❌ No attendance found for this date");
    return;
  }

  const attendance = JSON.parse(data);

  const historyTable = document.getElementById("historyTable");

  historyTable.innerHTML = "";

  attendance.forEach((item, index) => {

    let statusClass = "present";

    if(item.status === "Absent"){
      statusClass = "absent";
    }

    if(item.status === "Late"){
      statusClass = "late";
    }

    let row = `
      <tr>
        <td>${index + 1}</td>
        <td>${item.name}</td>
        <td class="${statusClass}">${item.status}</td>
      </tr>
    `;

    historyTable.innerHTML += row;
  });
}

function resetAttendance(){

  students.forEach(student => {

    const select = document.getElementById(`status-${student}`);

    if(select){
      select.value = "Present";
    }
  });

  updateStats();

  alert("Attendance reset successfully");
}

loadTable();

</script>

</body>
</html>
