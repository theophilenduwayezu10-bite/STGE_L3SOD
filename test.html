<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class Management System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Navbar */
.navbar {
    background: blue;
    padding: 15px;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-size: 18px;
}

.navbar a:hover {
    text-decoration: underline;
}

/* Hero section */
.hero {
    background: lightblue;
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hero h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 20px;
}

/* Button */
.btn {
    background: white;
    color: blue;
    padding: 15px 25px;
    border: 2px solid blue;
    margin-top: 20px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: blue;
    color: white;
}

/* Footer */
.footer {
    background: black;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="#">Home</a>
    <a href="#">Students</a>
    <a href="#">Teachers</a>
    <a href="#">Contact</a>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Welcome to Class Management System</h1>
    <p>Manage students, teachers and classes easily</p>
    <a href="#" class="btn">Get Started</a>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 Class System</p>
</div>

</body>
</html>
