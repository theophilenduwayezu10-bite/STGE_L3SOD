<!DOCTYPE html>
<html>
<head>
    <title>Teacher - Marks</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7fb;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #0f172a;
        }

        table {
            width: 95%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        th {
            background: #0f172a;
            color: white;
            padding: 10px;
        }

        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        input {
            width: 60px;
            text-align: center;
            padding: 5px;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 12px 25px;
            background: #38bdf8;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0f172a;
        }
    </style>
</head>

<body>

<h2>Teacher Marks Entry</h2>

<table>
<tr>
    <th>Name</th>
    <th>Website development</th>
    <th>Version Control</th>
    <th>JavaScript</th>
    <th>UI/UX</th>
    <th>Graphic Design</th>
    <th>Game Development</th>
    <th>Total</th>
</tr>

<tr>
    <td>theophile</td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td class="total">0</td>
</tr>

<tr>
    <td>vradmir</td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td class="total">0</td>
</tr>
<tr>
    <td>josiane</td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td class="total">0</td>
</tr>
<tr>
    <td>emmanuel</td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td class="total">0</td>
</tr>


</table>

<button onclick="saveMarks()">Save Marks</button>

<script>
function saveMarks() {
    let rows = document.querySelectorAll("table tr");
    let data = [];

    for (let i = 1; i < rows.length; i++) {

        let name = rows[i].cells[0].innerText;
        let inputs = rows[i].querySelectorAll("input");

        let marks = [];

        inputs.forEach(input => {
            let val = input.value === "" ? 0 : Number(input.value);
            marks.push(val);
        });

        let total = marks.reduce((a,b) => a + b, 0);

        rows[i].querySelector(".total").innerText = total;

        data.push({
            name: name,
            marks: marks,
            total: total
        });
    }

    localStorage.setItem("marks", JSON.stringify(data));
    alert("Marks Saved Successfully!");
}
</script>

</body>
</html>
