<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Marks Fixed</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    color:white;
}

h2{
    text-align:center;
    color:#facc15;
    padding:10px;
}

/* FORM */
.form-box{
    width:95%;
    margin:auto;
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:12px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

input, select{
    padding:10px;
    border-radius:8px;
    border:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0f172a;
    border:1px solid #38bdf8;
}

/* TABLE */
table{
    width:95%;
    margin:auto;
    margin-top:20px;
    background:white;
    color:black;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#0f172a;
    color:white;
    padding:10px;
}

td{
    text-align:center;
    padding:10px;
    border:1px solid #ddd;
}

.total{
    color:green;
    font-weight:bold;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>📘 Teacher Marks System (FIXED)</h2>

<div class="form-box">
    <input type="text" id="name" placeholder="Student Name">

    <select id="sex">
        <option value="">Sex</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <button onclick="addStudent()">➕ Add Student</button>
</div>

<table id="table">
<tr>
    <th>Name</th>
    <th>Sex</th>
    <th>Web</th>
    <th>Version</th>
    <th>JS</th>
    <th>UI</th>
    <th>Graphic</th>
    <th>Game</th>
    <th>Total</th>
    <th>Action</th>
</tr>
</table>

<div style="text-align:center;margin-top:20px;">
<button onclick="saveData()">💾 Save All</button>
</div>

<script>

let students = [];

/* LOAD DATA */
window.onload = function(){
    let saved = localStorage.getItem("cms_data");
    if(saved){
        students = JSON.parse(saved);
        students.forEach(s=>{
            addRow(s.name, s.sex, s.marks);
        });
    }
}

/* ADD STUDENT */
function addStudent(){

    let name = document.getElementById("name").value;
    let sex = document.getElementById("sex").value;

    if(name==="" || sex===""){
        alert("Fill all fields");
        return;
    }

    let student = {
        name:name,
        sex:sex,
        marks:[0,0,0,0,0,0]
    };

    students.push(student);
    addRow(name, sex, student.marks);

    saveData();

    document.getElementById("name").value="";
    document.getElementById("sex").value="";
}

/* CREATE ROW */
function addRow(name, sex, marks){

    let table = document.getElementById("table");

    let row = table.insertRow();

    row.innerHTML = `
        <td>${name}</td>
        <td>${sex}</td>

        <td><input type="number" value="${marks[0]}" oninput="update()"></td>
        <td><input type="number" value="${marks[1]}" oninput="update()"></td>
        <td><input type="number" value="${marks[2]}" oninput="update()"></td>
        <td><input type="number" value="${marks[3]}" oninput="update()"></td>
        <td><input type="number" value="${marks[4]}" oninput="update()"></td>
        <td><input type="number" value="${marks[5]}" oninput="update()"></td>

        <td class="total">0</td>

        <td><button class="delete-btn" onclick="deleteRow(this)">X</button></td>
    `;

    update();
}

/* DELETE */
function deleteRow(btn){
    let row = btn.parentElement.parentElement;
    row.remove();
    saveData();
}

/* UPDATE TOTAL */
function update(){

    let rows = document.querySelectorAll("#table tr");

    for(let i=1;i<rows.length;i++){

        let inputs = rows[i].querySelectorAll("input");

        let total = 0;

        inputs.forEach(inp=>{
            total += Number(inp.value || 0);
        });

        rows[i].cells[8].innerText = total;
    }
}

/* SAVE ALL DATA */
function saveData(){

    let rows = document.querySelectorAll("#table tr");

    students = [];

    for(let i=1;i<rows.length;i++){

        let cells = rows[i].cells;

        let name = cells[0].innerText;
        let sex = cells[1].innerText;

        let inputs = rows[i].querySelectorAll("input");

        let marks = [];

        inputs.forEach(inp=>{
            marks.push(Number(inp.value || 0));
        });

        students.push({
            name,
            sex,
            marks
        });
    }

    localStorage.setItem("cms_data", JSON.stringify(students));
}

</script>

</body>
</html>
