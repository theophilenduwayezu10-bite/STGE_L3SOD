<!DOCTYPE html>
<html>
<head>
<title>Teacher - Marks</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    padding:20px;
    color:white;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#facc15;
}

/* FORM */
.form-box{
    width:95%;
    margin:auto;
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

input, select{
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#38bdf8;
    color:white;
}

button:hover{
    background:#0f172a;
    border:1px solid #38bdf8;
}

/* TABLE */
table{
    width:95%;
    margin:auto;
    border-collapse:collapse;
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#0f172a;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
    border:1px solid #ddd;
}

input[type="number"]{
    width:60px;
}

.total{
    font-weight:bold;
    color:#16a34a;
}

/* DELETE BUTTON */
.delete-btn{
    background:#ef4444;
    color:white;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.delete-btn:hover{
    background:#b91c1c;
}

.back{
    margin-top:20px;
    text-align:center;
}

.back button{
    background:#facc15;
    color:black;
}
</style>

</head>

<body>

<h2>📘 Teacher Marks Entry</h2>

<!-- ADD STUDENT -->
<div class="form-box">
    <input type="text" id="name" placeholder="Student Name">

    <select id="sex">
        <option value="">Sex</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
    </select>

    <button onclick="addStudent()">➕ Add Student</button>
</div>

<table id="marksTable">
<tr>
    <th>Name</th>
    <th>Sex</th>
    <th>Web Dev</th>
    <th>Version</th>
    <th>JS</th>
    <th>UI/UX</th>
    <th>Graphic</th>
    <th>Game</th>
    <th>Total</th>
    <th>Action</th>
</tr>
</table>

<br>

<div style="text-align:center;">
<button onclick="saveMarks()">💾 Save Marks</button>
</div>

<div class="back">
<button onclick="window.location.href='index.html'">⬅ Go Back</button>
</div>

<script>

function addStudent(){

    let name = document.getElementById("name").value;
    let sex = document.getElementById("sex").value;

    if(name === "" || sex === ""){
        alert("Fill all fields");
        return;
    }

    let table = document.getElementById("marksTable");

    let row = table.insertRow();

    row.innerHTML = `
        <td>${name}</td>
        <td>${sex}</td>

        <td><input type="number"></td>
        <td><input type="number"></td>
        <td><input type="number"></td>
        <td><input type="number"></td>
        <td><input type="number"></td>
        <td><input type="number"></td>

        <td class="total">0</td>

        <td><button class="delete-btn" onclick="deleteRow(this)">Delete</button></td>
    `;

    document.getElementById("name").value = "";
    document.getElementById("sex").value = "";
}

/* DELETE ROW */
function deleteRow(btn){
    let row = btn.parentNode.parentNode;
    row.remove();
}

/* SAVE MARKS */
function saveMarks(){

    let rows = document.querySelectorAll("#marksTable tr");
    let data = [];

    for(let i=1; i<rows.length; i++){

        let cells = rows[i].cells;

        let name = cells[0].innerText;
        let sex = cells[1].innerText;

        let inputs = rows[i].querySelectorAll("input");

        let marks = [];

        inputs.forEach(inp=>{
            let val = inp.value === "" ? 0 : Number(inp.value);
            marks.push(val);
        });

        let total = marks.reduce((a,b)=>a+b,0);

        cells[8].innerText = total;

        data.push({
            name,
            sex,
            marks,
            total
        });
    }

    localStorage.setItem("class_marks", JSON.stringify(data));

    alert("Marks saved successfully!");
}

</script>

</body>
</html>
