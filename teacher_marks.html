<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Marks System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
min-height:100vh;
padding:20px;
color:white;
}

h2{
text-align:center;
margin-bottom:20px;
color:#facc15;
}

.form-box{
width:95%;
margin:auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.form-box input,
.form-box select{
padding:12px;
border:none;
border-radius:10px;
min-width:180px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
}

button:hover{
background:#0f172a;
border:1px solid #38bdf8;
}

.table-box{
width:95%;
margin:auto;
margin-top:20px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
min-width:1000px;
}

th{
background:#0f172a;
color:white;
padding:15px;
}

td{
border:1px solid #ddd;
text-align:center;
padding:10px;
}

td input{
width:70px;
padding:8px;
text-align:center;
}

.total{
color:green;
font-weight:bold;
}

.delete-btn{
background:red;
}

.save-box{
text-align:center;
margin-top:20px;
}

</style>
</head>

<body>

<h2>📘 Teacher Marks System</h2>

<div class="form-box">

<input type="text" id="name" placeholder="Student Name">

<select id="sex">
<option value="">Select Sex</option>
<option>Male</option>
<option>Female</option>
</select>

<button onclick="addStudent()">➕ Add Student</button>

</div>

<div class="table-box">

<table id="table">

<tr>
<th>Name</th>
<th>Sex</th>
<th>Web</th>
<th>Version</th>
<th>JavaScript</th>
<th>UI/UX</th>
<th>Graphic</th>
<th>Game</th>
<th>Total</th>
<th>Action</th>
</tr>

</table>

</div>

<div class="save-box">
<button onclick="saveData(true)">💾 Save All</button>
</div>

<script>

let students = [];

window.onload = function(){

let saved = localStorage.getItem("cms_data");

if(saved){

students = JSON.parse(saved);

students.forEach(student=>{
addRow(student.name,student.sex,student.marks);
});

}

}

function addStudent(){

let name = document.getElementById("name").value.trim();
let sex = document.getElementById("sex").value;

if(name==="" || sex===""){
alert("Fill all fields");
return;
}

let student = {
name:name,
sex:sex,
marks:[0,0,0,0,0,0]
};

students.push(student);

addRow(student.name,student.sex,student.marks);

saveData(false);

document.getElementById("name").value="";
document.getElementById("sex").value="";
}

function addRow(name,sex,marks){

let table = document.getElementById("table");

let row = table.insertRow();

row.innerHTML = `

<td>${name}</td>

<td>${sex}</td>

<td><input type="number" value="${marks[0]}" oninput="update()"></td>

<td><input type="number" value="${marks[1]}" oninput="update()"></td>

<td><input type="number" value="${marks[2]}" oninput="update()"></td>

<td><input type="number" value="${marks[3]}" oninput="update()"></td>

<td><input type="number" value="${marks[4]}" oninput="update()"></td>

<td><input type="number" value="${marks[5]}" oninput="update()"></td>

<td class="total">0</td>

<td>
<button class="delete-btn" onclick="deleteRow(this)">
X
</button>
</td>

`;

update(false);

}

function update(show=false){

let rows = document.querySelectorAll("#table tr");

for(let i=1;i<rows.length;i++){

let inputs = rows[i].querySelectorAll("input");

let total = 0;

inputs.forEach(inp=>{
total += Number(inp.value || 0);
});

rows[i].cells[8].innerText = total;

}

saveData(show);

}

function deleteRow(btn){

btn.parentElement.parentElement.remove();

update(false);

}

function saveData(show=true){

let rows = document.querySelectorAll("#table tr");

students = [];

for(let i=1;i<rows.length;i++){

let cells = rows[i].cells;

let inputs = rows[i].querySelectorAll("input");

let marks = [];

inputs.forEach(inp=>{
marks.push(Number(inp.value || 0));
});

students.push({
name:cells[0].innerText,
sex:cells[1].innerText,
marks:marks
});

}

localStorage.setItem(
"cms_data",
JSON.stringify(students)
);

if(show){
alert("✅ Marks Saved Successfully");
}

}

</script>

</body>
</html>
