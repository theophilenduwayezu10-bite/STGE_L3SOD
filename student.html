<script>
function checkStudent() {
  let name = document.getElementById("name").value.toLowerCase().trim();

  const students = [
    "theophile","emile","dan","sumaya","josiane","gikundiro",
    "sandrine","claire","augustin","vradmir","manishimwe",
    "nduwayezu","eric","theodethe","nadia","evaliste","beulla",
    "hamiss","marieleine","daphine","lydia","ange","christian",
    "danny","edouige","teta","liliane"
  ];

  if (students.includes(name)) {
    window.location.href = "next.html";
  } else {
    document.getElementById("result").innerText =
      "You are not a student of level 3 SOD, please try again.";
  }
}
