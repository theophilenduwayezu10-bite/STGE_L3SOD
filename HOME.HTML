<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gicumbi District</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    transition: 1s;
}

/* TOP NAV BAR */
.navbar {
    background: #0047ab;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
}

.navbar a {
    color: rgb(234, 185, 239);
    text-decoration: none;
    font-weight: bold;
    padding: 10px 15px;
    border-radius: 8px;
    transition: 0.3s;
}

.navbar a:hover {
    background: rgb(181, 224, 138);
    color: #0047ab;
}

/* MAIN CONTENT */
.container {
    text-align: center;
    padding: 40px;
}

h1 {
    color: rgb(165, 92, 92);
    font-size: 32px;
}

p {
    color: white;
    font-size: 18px;
}

/* IMAGE AREA */
.image-box {
    margin: 40px auto;
    width: 80%;
    height: 350px;
    border: 3px dashed rgb(162, 186, 215);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 20px;
    border-radius: 15px;
}

/* BACKGROUND ANIMATION */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body bgcolor="blue">

<!-- NAVIGATION LINKS TOP -->
<div class="navbar">
    <a href="#">Login</a>
    <a href="#">Know Gicumbi</a>
    <a href="#">Images</a>
    <a href="#">Videos</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</div>

<!-- MAIN -->
<div class="container">

    <h1>WELCOME TO GICUMBI DISTRICT WEBSITE</h1>

    <p>
        Gicumbi ni akarere keza k’imisozi n’ubuhinzi bugezweho,
        gafite amahoro, umutekano n’iterambere ry’abaturage.
    </p>

    <!-- IMAGE PLACE -->
    <div class="image-box">
        PUT YOUR DISTRICT IMAGE HERE
    </div>

</div>

<script>
// BACKGROUND COLORS (BLUE, RED, GREEN)
const colors = [
    "linear-gradient(to right, #1e3a8a, #3b82f6)", 
    "linear-gradient(to right, #b91c1c, #ef4444)", 
    "linear-gradient(to right, #166534, #22c55e)"
];

let i = 0;

setInterval(() => {
    document.body.style.background = colors[i];
    i = (i + 1) % colors.length;
}, 3000);
</script>

</body>
</html>
