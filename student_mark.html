<!DOCTYPE html>
<html>
<head>
<title>Student Marks View</title>

<style>

body{
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    margin:0;
    padding:20px;
    color:white;
}

/* ================= HEADER TITLE ================= */

h2{
    text-align:center;
    color:#facc15;
    margin-bottom:20px;
    font-size:28px;
    text-shadow:2px 2px 4px rgba(0,0,0,0.4);
}

/* ================= TABLE CONTAINER ================= */

table{
    width:95%;
    margin:auto;
    border-collapse:collapse;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    color:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* HEADER ROW */

th{
    background:#0f172a;
    color:#facc15;
    padding:14px;
    font-size:14px;
    text-transform:uppercase;
}

/* TABLE CELLS */

td{
    border:1px solid rgba(255,255,255,0.15);
    padding:12px;
    text-align:center;
}

/* ROW HOVER EFFECT */

tr:hover{
    background:rgba(255,255,255,0.1);
    transition:0.3s;
}

/* TOTAL COLUMN */

.total{
    color:#22c55e;
    font-weight:bold;
}

/* ================= MESSAGE ================= */

.msg{
    text-align:center;
    margin-top:20px;
    color:#f87171;
    font-size:18px;
}

/* ================= BUTTON ================= */

button{
    display:block;
    margin:25px auto 0;
    padding:10px 18px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    color:#0f172a;
    transition:0.3s;
}

button:hover{
    background:#facc15;
    transform:scale(1.05);
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){

    table{
        font-size:12px;
    }

    th, td{
        padding:8px;
    }

    h2{
        font-size:20px;
    }
}

</style>

</head>

<body>

<h2>📘 Student Marks (READ ONLY)</h2>

<table>
<tr>
    <th>Name</th>
    <th>Sex</th>
    <th>Web</th>
    <th>Version</th>
    <th>JS</th>
    <th>UI/UX</th>
    <th>Graphic</th>
    <th>Game</th>
    <th>Total</th>
</tr>

<tbody id="data"></tbody>
</table>

<p class="msg" id="msg"></p>

<button onclick="window.location.href='index.html'">⬅ Go Back</button>

<script>

let saved = JSON.parse(localStorage.getItem("class_marks")) || [];

let tbody = document.getElementById("data");

if(saved.length === 0){
    document.getElementById("msg").innerText = "⚠ No marks saved yet!";
}else{

    saved.forEach(student => {

        let m = student.marks || [0,0,0,0,0,0];

        let row = `
        <tr>
            <td>${student.name}</td>
            <td>${student.sex}</td>
            <td>${m[0]}</td>
            <td>${m[1]}</td>
            <td>${m[2]}</td>
            <td>${m[3]}</td>
            <td>${m[4]}</td>
            <td>${m[5]}</td>
            <td class="total">${student.total}</td>
        </tr>
        `;

        tbody.innerHTML += row;
    });
}

</script>

</body>
</html>
