<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Marks</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
min-height:100vh;
padding:20px;
color:white;
}

h2{
text-align:center;
margin-bottom:20px;
color:#facc15;
}

.table-box{
width:95%;
margin:auto;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
min-width:1000px;
}

th{
background:#0f172a;
color:white;
padding:15px;
}

td{
border:1px solid #ddd;
text-align:center;
padding:10px;
}

.total{
color:green;
font-weight:bold;
}

.refresh{
text-align:center;
margin-bottom:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
}

button:hover{
background:#0f172a;
border:1px solid #38bdf8;
}

</style>
</head>

<body>

<h2>📘 Student Marks</h2>

<div class="refresh">
<button onclick="loadMarks()">🔄 Refresh</button>         <button onclick="window.location.href='index.html'">Go Back</button>
</div>

<div class="table-box">

<table id="table">

<tr>
<th>Name</th>
<th>Sex</th>
<th>Web</th>
<th>Version</th>
<th>JavaScript</th>
<th>UI/UX</th>
<th>Graphic</th>
<th>Game</th>
<th>Total</th>
</tr>

</table>

</div>

<script>

function loadMarks(){

let table = document.getElementById("table");

table.innerHTML = `

<tr>
<th>Name</th>
<th>Sex</th>
<th>Web</th>
<th>Version</th>
<th>JavaScript</th>
<th>UI/UX</th>
<th>Graphic</th>
<th>Game</th>
<th>Total</th>
</tr>

`;

let students =
JSON.parse(localStorage.getItem("cms_data")) || [];

students.forEach(student=>{

let total = 0;

student.marks.forEach(mark=>{
total += Number(mark);
});

let row = table.insertRow();

row.innerHTML = `

<td>${student.name}</td>

<td>${student.sex}</td>

<td>${student.marks[0]}</td>

<td>${student.marks[1]}</td>

<td>${student.marks[2]}</td>

<td>${student.marks[3]}</td>

<td>${student.marks[4]}</td>

<td>${student.marks[5]}</td>

<td class="total">${total}</td>

`;

});

}

window.onload = loadMarks;

setInterval(loadMarks,1000);

</script>

</body>
</html>
