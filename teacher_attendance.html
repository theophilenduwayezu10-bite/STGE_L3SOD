<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Attendance System</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
  color:white;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1,h2{
  text-align:center;
  color:#facc15;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

input,select{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.add-btn{
  background:#22c55e;
  color:white;
}

.save-btn{
  background:#3b82f6;
  color:white;
}

.delete-btn{
  background:#ef4444;
  color:white;
}

.search-btn{
  background:#facc15;
  color:black;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th{
  background:#facc15;
  color:black;
  padding:10px;
}

td{
  background:rgba(255,255,255,0.08);
  text-align:center;
  padding:10px;
}

.view-box{
  margin-top:30px;
}
</style>
</head>

<body>

<div class="container">

<h1>📘 Teacher Attendance System</h1>

<div class="card">

<!-- ADD STUDENT -->
<input type="text" id="name" placeholder="Student Name">

<select id="sex">
  <option value="">Sex</option>
  <option>Male</option>
  <option>Female</option>
</select>

<button class="add-btn" onclick="addStudent()">➕ Add Student</button>

<button onclick="window.location.href='next_teach.html'">
⬅ Go Back
</button>

<br><br>

<!-- DATE -->
<label>Select Attendance Date:</label>
<input type="date" id="attendanceDate">

<table>

<thead>
<tr>
  <th>Name</th>
  <th>Sex</th>
  <th>Status</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<br>

<button class="save-btn" onclick="saveAttendance()">
💾 Save Attendance
</button>

</div>

<!-- STUDENT VIEW -->
<div class="card view-box">

<h2>📅 View Attendance By Date</h2>

<input type="date" id="viewDate">

<button class="search-btn" onclick="viewAttendance()">
🔍 View Attendance
</button>

<table>

<thead>
<tr>
  <th>Name</th>
  <th>Sex</th>
  <th>Status</th>
</tr>
</thead>

<tbody id="attendanceView"></tbody>

</table>

</div>

</div>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];

// LOAD STUDENTS
function load(){

  let table = document.getElementById("table");

  table.innerHTML = "";

  students.forEach((s,i)=>{

    table.innerHTML += `
      <tr>

        <td>${s.name}</td>

        <td>${s.sex}</td>

        <td>
          <select id="status-${i}">
            <option>Present</option>
            <option>Absent</option>
            <option>Late</option>
          </select>
        </td>

        <td>
          <button class="delete-btn"
          onclick="deleteStudent(${i})">
          Delete
          </button>
        </td>

      </tr>
    `;
  });
}

// ADD STUDENT
function addStudent(){

  let name = document.getElementById("name").value;
  let sex = document.getElementById("sex").value;

  if(name==="" || sex===""){
    alert("Fill all fields");
    return;
  }

  students.push({name,sex});

  localStorage.setItem(
    "students",
    JSON.stringify(students)
  );

  document.getElementById("name").value="";
  document.getElementById("sex").value="";

  load();
}

// DELETE
function deleteStudent(index){

  if(confirm("Delete this student?")){

    students.splice(index,1);

    localStorage.setItem(
      "students",
      JSON.stringify(students)
    );

    load();
  }
}

// SAVE ATTENDANCE
function saveAttendance(){

  let date =
  document.getElementById("attendanceDate").value;

  if(date===""){
    alert("Select date first");
    return;
  }

  let data = [];

  students.forEach((s,i)=>{

    let status =
    document.getElementById("status-"+i).value;

    data.push({
      name:s.name,
      sex:s.sex,
      status:status
    });

  });

  localStorage.setItem(
    "attendance_"+date,
    JSON.stringify(data)
  );

  alert("Attendance Saved Successfully!");
}

// VIEW ATTENDANCE
function viewAttendance(){

  let date =
  document.getElementById("viewDate").value;

  if(date===""){
    alert("Select date");
    return;
  }

  let attendance =
  JSON.parse(
    localStorage.getItem("attendance_"+date)
  ) || [];

  let table =
  document.getElementById("attendanceView");

  table.innerHTML="";

  if(attendance.length===0){

    table.innerHTML = `
      <tr>
        <td colspan="3">
        No attendance found
        </td>
      </tr>
    `;

    return;
  }

  attendance.forEach((a)=>{

    table.innerHTML += `
      <tr>

        <td>${a.name}</td>

        <td>${a.sex}</td>

        <td>${a.status}</td>

      </tr>
    `;
  });

}

load();

</script>

</body>
</html>
