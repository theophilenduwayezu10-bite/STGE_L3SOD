<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marks Management</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  text-align:center;
}

h2{
  background:black;
  color:white;
  padding:15px;
  margin:0;
}

.container{
  width:90%;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
  padding:10px;
  margin:5px;
  width:200px;
}

button{
  padding:10px 15px;
  background:green;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

button:hover{
  background:darkgreen;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  border:1px solid #ccc;
  padding:10px;
}

th{
  background:#333;
  color:white;
}
</style>
</head>
<body>

<h2>MARKS MANAGEMENT SYSTEM</h2>

<div class="container">

  <input type="text" id="student" placeholder="Student Name">
  <input type="number" id="math" placeholder="Math">
  <input type="number" id="english" placeholder="English">
  <input type="number" id="science" placeholder="Science">

  <button onclick="addMarks()">Save Marks</button>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Math</th>
        <th>English</th>
        <th>Science</th>
        <th>Total</th>
        <th>Average</th>
