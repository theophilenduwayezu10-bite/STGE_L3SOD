<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Access</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:600px;
}

h3{
  text-align:center;
  margin-bottom:20px;
  color:#facc15;
}

fieldset{
  border:1px solid rgba(255,255,255,0.3);
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

legend{
  color:#60a5fa;
  font-weight:bold;
}

p{
  margin:10px 0;
  color:#cbd5e1;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  outline:none;
}

button{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

/* NEXT BUTTON */
button:nth-of-type(1){
  background:#22c55e;
  color:white;
}

/* GO BACK BUTTON */
.back-btn{
  background:#facc15;
  color:black;
  margin-top:10px;
}

#result{
  margin-top:15px;
  color:#ef4444;
  text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h3>WELCOME AS TEACHER ON CLASS MANAGEMENT SYSTEM</h3>

<fieldset>
<legend>Teacher Information</legend>

<p>You must enter your name to access the next page</p>

<input type="text" id="name" placeholder="Enter your name" >

<button onclick="checkStudent()">NEXT</button>

<p id="result"></p>

<button class="back-btn" onclick="window.location.href='index.html'">⬅ GO BACK</button>
</fieldset>
<script>
function checkStudent() {
  let name = document.getElementById("name").value.toLowerCase().trim();

  const students = [
  "remy","joseph","ntwari","louis","rwemanika","JOSEPH","NTWARI","LOUIS","RWEMANIKA","ASHIMIRWE JOSEPH MARIE","NTWARI REMY","LOUIS RWEMANIKA","RWEMANIKA JEAN LOUIS","JEAN PIERRE","PIERRE","JEAN","JEAN LOUIS","ASHIMIRWE JOSEPH","ASHIMIRWE","JOSEPH MARIE ASHIMIRWE","MARIE ASHIMIRWE","ASHIMIRWE MARIE","JOSEPH ASHIMIRWE","MARIE JOSEPH ASHIMIRWE","jean pierre","pierre","jean","jean louis","ashimirwe joseph","ashimirwe","joseph marie ashimirwe","marie ashimirwe","ashimirwe marie","joseph ashimirwe","marie joseph ashimirwe","remy","joseph","ntwari","louis","rwemanika","JOSEPH","NTWARI","LOUIS","RWEMANIKA","ASHIMIRWE JOSEPH MARIE","NTWARI REMY","LOUIS RWEMANIKA","RWEMANIKA JEAN LOUIS","JEAN PIERRE","PIERRE","JEAN","JEAN LOUIS","ASHIMIRWE JOSEPH","ASHIMIRWE","JOSEPH MARIE ASHIMIRWE","MARIE ASHIMIRWE","ASHIMIRWE MARIE","JOSEPH ASHIMIRWE","MARIE JOSEPH ASHIMIRWE","jean"
  ];

  if (students.includes(name)) {
    window.location.href = "next_teach.html";
  } else {
    document.getElementById("result").innerText =
      "❌ You are not a teacher of level 3 SOD";
  }
}
</script>

</fieldset>

</div>

</body>
</html>
