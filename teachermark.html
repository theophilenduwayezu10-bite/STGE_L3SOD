<!DOCTYPE html>
<html lang="en">
<head>

<title>Ranking + Marks System</title>
<style>
body{

  background:#f4f6f9;

}

h2{

  margin:0;
}

.container{
  width:90%;
  margin:20px auto;
  background:white;
  padding:20px;
