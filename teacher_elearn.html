<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Panel</title>

<style>

body{
    background:#0b0f19;
    color:white;
    font-family:Arial;
    padding:20px;
}

/* TITLE */
h1{
    text-align:center;
    color:#3b82f6;
    margin-bottom:20px;
}

/* FORM BOX */
.box{
    max-width:600px;
    margin:auto;
    background:#111827;
    padding:20px;
    border:1px solid #3b82f6;
    border-radius:12px;
}

/* INPUTS */
input, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #3b82f6;
    outline:none;
}

input{
    background:#0b0f19;
    color:white;
}

/* UPLOAD BUTTON */
.upload-btn{
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.upload-btn:hover{
    background:#2563eb;
}

/* CARDS */
.card{
    background:#111827;
    border:1px solid #3b82f6;
    margin-top:15px;
    padding:15px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-3px);
}

/* DOWNLOAD LINK */
.card a{
    display:inline-block;
    margin-top:8px;
    color:#60a5fa;
    text-decoration:none;
}

/* ================= SMALL BUTTONS ================= */

/* DELETE BUTTON SMALL */
.del{
    margin-top:10px;
    padding:6px 10px;   /* 👈 ntoya */
    width:auto;         /* 👈 ntiba full width */
    background:#ef4444;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    font-size:12px;
    transition:0.3s;
}

.del:hover{
    background:#dc2626;
}

/* GO BACK BUTTON SMALL */
.back-btn{
    display:block;
    margin:20px auto 0;
    padding:8px 14px;
    width:auto;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:13px;
    transition:0.3s;
}

.back-btn:hover{
    background:#16a34a;
}

</style>
</head>

<body>

<h1>TEACHER PANEL</h1>

<div class="box">

<input type="text" id="title" placeholder="Subject Name">
<input type="file" id="file">

<button class="upload-btn" onclick="upload()">Upload Subject</button>

</div>

<div id="list"></div>

<!-- SMALL BACK BUTTON -->
<button class="back-btn" onclick="window.location.href='next_teach.html'">
⬅ Go Back
</button>

<script>

function upload(){

    let title = document.getElementById("title").value;
    let file = document.getElementById("file").files[0];

    if(!title || !file){
        alert("Fill all fields");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(){

        let data = JSON.parse(localStorage.getItem("subjects")) || [];

        data.push({
            title:title,
            file:reader.result,
            name:file.name
        });

        localStorage.setItem("subjects", JSON.stringify(data));

        show();
    }

    reader.readAsDataURL(file);
}

function deleteItem(i){

    let data = JSON.parse(localStorage.getItem("subjects")) || [];

    data.splice(i,1);

    localStorage.setItem("subjects", JSON.stringify(data));

    show();
}

function show(){

    let data = JSON.parse(localStorage.getItem("subjects")) || [];

    let out = "";

    data.forEach((s,i)=>{

        out += `
        <div class="card">
            <h3>${s.title}</h3>
            <a href="${s.file}" download="${s.name}">Download</a>
            <br>
            <button class="del" onclick="deleteItem(${i})">Delete</button>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = out;
}

show();

setInterval(show,1000);

</script>

</body>
</html>
